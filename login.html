<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion | Home in Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  body { min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }
  .login-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .login-card {
    background:var(--surf); border:1px solid var(--border);
    border-radius:22px; padding:40px; width:100%; max-width:420px;
    box-shadow:0 12px 48px var(--shadow);
    animation:modalUp .3s cubic-bezier(.22,1,.36,1);
  }
  @keyframes modalUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  .login-logo { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:28px; }
  .login-logo-mark {
    width:48px; height:48px; border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--teal));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:14px; font-weight:800; letter-spacing:.5px;
  }
  .login-title { font-family:'Lora',serif; font-size:22px; text-align:center; color:var(--text); margin-bottom:6px; }
  .login-sub { text-align:center; font-size:13px; color:var(--muted); margin-bottom:28px; }
  .form-group { margin-bottom:16px; }
  .form-group label {
    display:block; font-size:11px; font-weight:800; color:var(--muted);
    text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px;
  }
  .form-group input {
    width:100%; border:1.5px solid var(--border); border-radius:11px;
    padding:11px 14px; font-size:14px; font-family:inherit; color:var(--text);
    background:var(--surf); transition:border-color .15s;
  }
  .form-group input:focus { outline:none; border-color:var(--accent); }
  .login-error {
    background:rgba(224,36,36,.08); border:1px solid rgba(224,36,36,.2);
    border-radius:10px; padding:10px 14px; font-size:13px; color:#e02424;
    font-weight:600; margin-bottom:16px; text-align:center; display:none;
  }
  .login-error.visible { display:block; }
  .btn-login {
    width:100%; background:var(--accent); color:#fff; border:none;
    border-radius:12px; padding:13px; font-family:'Plus Jakarta Sans',sans-serif;
    font-size:15px; font-weight:700; cursor:pointer; transition:all .18s; margin-top:6px;
  }
  .btn-login:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 8px 24px rgba(30,99,240,.35); }
  .login-back {
    display:block; text-align:center; margin-top:20px;
    font-size:13px; color:var(--muted); font-weight:600; text-decoration:none; transition:color .15s;
  }
  .login-back:hover { color:var(--text); }

  /* Demo accounts */
  .demo-hint { margin-top:24px; border-top:1px solid var(--border); padding-top:20px; }
  .demo-hint-title {
    font-size:10px; font-weight:800; text-transform:uppercase;
    letter-spacing:.1em; color:var(--muted); margin-bottom:12px; text-align:center;
  }
  .demo-section-label {
    font-size:10px; font-weight:800; text-transform:uppercase;
    letter-spacing:.08em; color:var(--muted); margin:10px 0 6px;
  }
  .demo-accounts { display:flex; flex-direction:column; gap:6px; }
  .demo-account {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surf2); border:1px solid var(--border);
    border-radius:9px; padding:9px 12px; cursor:pointer;
    transition:all .15s; font-size:12px;
  }
  .demo-account:hover { border-color:var(--accent); background:rgba(30,99,240,.06); }
  .demo-account-left { display:flex; align-items:center; gap:10px; }
  .demo-avatar {
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:800; flex-shrink:0;
  }
  .avatar-client  { background:linear-gradient(135deg,var(--accent),var(--teal)); }
  .avatar-ops     { background:linear-gradient(135deg,var(--teal),#059669); }
  .avatar-admin   { background:linear-gradient(135deg,#f59e0b,#d97706); }
  .demo-account-name  { font-weight:700; color:var(--text); }
  .demo-account-sub   { font-size:11px; color:var(--muted); margin-top:1px; }
  .demo-badge {
    font-size:10px; font-weight:800; padding:3px 9px;
    border-radius:100px; flex-shrink:0;
  }
  .badge-client { background:rgba(30,99,240,.1);  color:var(--accent); }
  .badge-ops    { background:rgba(11,165,146,.1); color:var(--teal);   }
  .badge-admin  { background:rgba(245,158,11,.1); color:#d97706;       }
  .demo-password { text-align:center; font-size:11px; color:var(--muted); margin-top:12px; }
  .demo-password strong { color:var(--text); }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-mark">HIL</div>
      <span style="font-family:'Lora',serif;font-size:22px;color:var(--text)">Home in Love</span>
    </div>

    <div class="login-title">Connexion</div>
    <div class="login-sub">Accédez à votre espace Home in Love</div>

    <div class="login-error" id="loginError">Email ou mot de passe incorrect.</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="email@exemple.fr" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="passwordInput" placeholder="••••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="handleLogin()">Entrer dans mon espace →</button>

    <a href="index.html" class="login-back">← Retour au site</a>

    <!-- Comptes démo -->
    <div class="demo-hint">
      <div class="demo-hint-title">Comptes de démonstration</div>

      <div class="demo-section-label">👤 Espace client</div>
      <div class="demo-accounts" id="demoClients"></div>

      <div class="demo-section-label">🏢 Espace interne</div>
      <div class="demo-accounts" id="demoInternes"></div>

      <div class="demo-password">Mot de passe : <strong>homeinlove2026</strong></div>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
<script>
  authLogoutSilent();

  var DEMO_DISPLAY = [
    {
      email    : 'client@demo.fr',
      avatar   : 'SM',
      nom      : 'Sophie Martin',
      sub      : '6 projets — Achat, Location, Invest…',
      role     : 'client',
      avatarCls: 'avatar-client',
      badgeCls : 'badge-client',
      badgeTxt : 'Client',
    },
    {
      email    : 'ops@homeinlove.fr',
      avatar   : 'CD',
      nom      : 'Claire Dupont',
      sub      : 'Opérationnelle Production',
      role     : 'ops_production',
      avatarCls: 'avatar-ops',
      badgeCls : 'badge-ops',
      badgeTxt : 'Mandataire',
    },
    {
      email    : 'admin@homeinlove.fr',
      avatar   : 'AH',
      nom      : 'Admin HIL',
      sub      : 'Accès total',
      role     : 'superadmin',
      avatarCls: 'avatar-admin',
      badgeCls : 'badge-admin',
      badgeTxt : 'Super Admin',
    },
  ];

  function makeCard(u) {
    var div = document.createElement('div');
    div.className = 'demo-account';
    div.onclick = function() {
      document.getElementById('emailInput').value    = u.email;
      document.getElementById('passwordInput').value = DEMO_PASSWORD;
    };
    div.innerHTML =
      '<div class="demo-account-left">' +
        '<div class="demo-avatar ' + u.avatarCls + '">' + u.avatar + '</div>' +
        '<div>' +
          '<div class="demo-account-name">' + u.nom + '</div>' +
          '<div class="demo-account-sub">' + u.sub + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="demo-badge ' + u.badgeCls + '">' + u.badgeTxt + '</div>';
    return div;
  }

  DEMO_DISPLAY.filter(function(u){ return u.role === 'client'; }).forEach(function(u){
    document.getElementById('demoClients').appendChild(makeCard(u));
  });
  DEMO_DISPLAY.filter(function(u){ return u.role !== 'client'; }).forEach(function(u){
    document.getElementById('demoInternes').appendChild(makeCard(u));
  });

  function handleLogin() {
    var email    = document.getElementById('emailInput').value.trim();
    var password = document.getElementById('passwordInput').value;
    var error    = document.getElementById('loginError');
    error.classList.remove('visible');
    var user = authLoginAndRedirect(email, password);
    if (!user) {
      error.classList.add('visible');
      document.getElementById('passwordInput').value = '';
    }
  }

  document.getElementById('passwordInput').addEventListener('keydown', function(e){ if(e.key==='Enter') handleLogin(); });
  document.getElementById('emailInput').addEventListener('keydown',    function(e){ if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
